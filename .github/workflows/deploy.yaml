name: Deploy to DigitalOcean Droplet
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp -rp /srv/backend /srv/backend.bak || true
            cp -rp /var/www/html /var/www/html.bak || true

      - name: Deploy frontend to DigitalOcean Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/client/*"
          target: "/var/www/html/"
          strip_components: 2

      - name: Deploy backend to DigitalOcean Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/backend/*"
          target: "/srv/backend/"
          strip_components: 2

      - name: Start backend with pm2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            printf 'GITHUB_USERNAME="%s"\nGITHUB_TOKEN="%s"\n' \
              '${{ vars.MY_GITHUB_USERNAME }}' \
              '${{ secrets.MY_GITHUB_TOKEN }}' \
              > /srv/backend/.env
            pm2 startOrRestart /srv/backend/ecosystem.config.cjs --env production --update-env
            pm2 save

  validate-backend-status:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check backend status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            pm2 show personal-website-api | grep -q "status.*online" || exit 1
      - name: Ping backend health endpoint
        run: curl -f ${{ vars.API_DOMAIN_NAME }}/api/status || exit 1

  rollback:
    needs: [build-and-deploy, validate-backend-status]
    if: needs.build-and-deploy.result == 'success' && needs.validate-backend-status.result == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp -rp /srv/backend.bak/. /srv/backend/
            cp -rp /var/www/html.bak/. /var/www/html/
            printf 'GITHUB_USERNAME=%s\nGITHUB_TOKEN=%s\n' \
              '${{ vars.MY_GITHUB_USERNAME }}' \
              '${{ secrets.MY_GITHUB_TOKEN }}' \
              > /srv/backend/.env
            pm2 startOrRestart /srv/backend/ecosystem.config.cjs --env production --update-env
            pm2 save
