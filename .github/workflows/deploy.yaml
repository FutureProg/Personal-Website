name: Deploy to DigitalOcean Droplet
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Stage backend package.json for deploy
        run: cp src/backend/package.json dist/backend/package.json

      - name: Deploy frontend to DigitalOcean Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/client/*"
          target: "/var/www/html/"
          strip_components: 2

      - name: Deploy backend to DigitalOcean Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/backend/*"
          target: "/srv/backend/"
          strip_components: 2

      - name: Start backend with pm2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/backend
            npm install --omit=dev
            pm2 describe backend > /dev/null 2>&1 \
              && pm2 restart backend \
              || pm2 start index.js --name backend
            pm2 save
