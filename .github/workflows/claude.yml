name: Claude Code

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Prevent Claude from triggering itself on its own comments
    if: |
      github.actor != 'claude[bot]' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'claude') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'COLLABORATOR' || github.event.issue.author_association == 'MEMBER')) ||
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Ensures commits made by Claude are attributed to the bot, not the repo owner
      - name: Configure git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      # When triggered by the 'claude' label: prompt Claude to ask questions first
      - name: Run Claude Code (label trigger)
        if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You have been assigned this GitHub issue via the "claude" label.
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            Read the issue title and body carefully. If anything is unclear or you need
            more information before you can begin, post a comment asking your questions —
            do not make assumptions. Once you have enough context, proceed with the task.

      # For all other triggers (@claude mentions, issue comments on claude-labeled issues, PR reviews)
      # No prompt override — Claude reads the triggering comment/body directly
      - name: Run Claude Code
        if: "!(github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude')"
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read