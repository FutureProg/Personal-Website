<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="die-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="die-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Back die (showing 3 — diagonal) -->
  <rect x="8" y="1" width="15" height="15" rx="3.5" fill="url(#die-back)"/>
  <circle cx="11.5" cy="4.5" r="1.4" fill="white" fill-opacity="0.85"/>
  <circle cx="15.5" cy="8.5" r="1.4" fill="white" fill-opacity="0.85"/>
  <circle cx="19.5" cy="12.5" r="1.4" fill="white" fill-opacity="0.85"/>

  <!-- Front die (showing 4) -->
  <rect x="1" y="8" width="15" height="15" rx="3.5" fill="url(#die-front)"/>
  <circle cx="5.5" cy="12.5" r="1.6" fill="white"/>
  <circle cx="11.5" cy="12.5" r="1.6" fill="white"/>
  <circle cx="5.5" cy="18.5" r="1.6" fill="white"/>
  <circle cx="11.5" cy="18.5" r="1.6" fill="white"/>
</svg>
